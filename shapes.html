<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mission Shapes</title>
    <style>
      body {
        background-image: url("https://static.vecteezy.com/system/resources/thumbnails/006/039/823/large/astronaut-on-another-planet-with-dust-and-fog-video.jpg");
        background-size: cover;
        background-attachment: fixed;
        font-family: Arial, sans-serif;
        color: white;
        text-align: center;
        padding: 50px;
      }

      .shape-box {
        background-color: rgba(249, 225, 225, 0.549);
        padding: 30px;
        border: 2px solid #3498db;
        display: inline-block;
        border-radius: 15px;
        margin-right: 700px;
      }

      h2 {
        color: #3498db;
      }

      canvas {
        border: 1px solid #242020;
        margin-top: 20px;
      }

      h3{
        color: #181616;
      }

      .nav-link {
        display: block;
        margin-bottom: 20px;
        color: #f1c40f;
        text-decoration: none;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="shape-box">
      <a href="index.html" class="nav-link">← Return to Mission Dashboard</a>

      <h2>Task 12: Geometric Shapes</h2>

      <h3>SVG Rectangle</h3>
      <svg width="200" height="100">
        <rect
          width="200"
          height="100"
          style="fill: #3498db; stroke: white; stroke-width: 2"
        />
      </svg>

      <hr style="border: 0.5px solid #444; margin: 30px 0" />

      <h3>Canvas Circle</h3>
      <canvas id="myCanvas" width="200" height="200"></canvas>

      <script>
        // 1. Fetch the ID
        var c = document.getElementById("myCanvas");
        var ctx = c.getContext("2d");

        // 2. Write the dimensions and position
        ctx.beginPath();
        ctx.arc(100, 100, 70, 0, 2 * Math.PI);

        // 3. Fill colour
        ctx.fillStyle = "#e74c3c";

        // 4. Insert the shape
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = "white";
        ctx.stroke();
      </script>
    </div>
  </body>
</html>
